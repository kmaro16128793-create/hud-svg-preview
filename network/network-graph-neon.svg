<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="net-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Edges -->
  <line x1="200" y1="125" x2="100" y2="60" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>
  <line x1="200" y1="125" x2="300" y2="60" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>
  <line x1="200" y1="125" x2="80" y2="160" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>
  <line x1="200" y1="125" x2="320" y2="160" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>
  <line x1="200" y1="125" x2="150" y2="210" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>
  <line x1="200" y1="125" x2="250" y2="210" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>
  <line x1="100" y1="60" x2="80" y2="160" stroke="rgba(113,28,145,0.1)" stroke-width="1"/>
  <line x1="300" y1="60" x2="320" y2="160" stroke="rgba(113,28,145,0.1)" stroke-width="1"/>
  <line x1="80" y1="160" x2="150" y2="210" stroke="rgba(255,0,141,0.1)" stroke-width="1"/>
  <line x1="320" y1="160" x2="250" y2="210" stroke="rgba(255,0,141,0.1)" stroke-width="1"/>
  <line x1="100" y1="60" x2="300" y2="60" stroke="rgba(0,229,255,0.06)" stroke-width="1"/>

  <!-- Outer glow rings -->
  <circle cx="200" cy="125" r="20" fill="rgba(0,229,255,0.04)" stroke="none"/>
  <circle cx="100" cy="60" r="14" fill="rgba(255,0,141,0.04)" stroke="none"/>
  <circle cx="300" cy="60" r="14" fill="rgba(255,0,141,0.04)" stroke="none"/>

  <!-- Nodes -->
  <circle cx="200" cy="125" r="12" fill="#091833" stroke="#00E5FF" stroke-width="1.5" filter="url(#net-glow)"/>
  <circle cx="200" cy="125" r="5" fill="#00E5FF" opacity="0.8"/>

  <circle cx="100" cy="60" r="9" fill="#091833" stroke="#FF008D" stroke-width="1" filter="url(#net-glow)"/>
  <circle cx="100" cy="60" r="4" fill="#FF008D" opacity="0.8"/>

  <circle cx="300" cy="60" r="9" fill="#091833" stroke="#FF008D" stroke-width="1" filter="url(#net-glow)"/>
  <circle cx="300" cy="60" r="4" fill="#FF008D" opacity="0.8"/>

  <circle cx="80" cy="160" r="7" fill="#091833" stroke="#711C91" stroke-width="1" filter="url(#net-glow)"/>
  <circle cx="80" cy="160" r="3" fill="#711C91" opacity="0.8"/>

  <circle cx="320" cy="160" r="7" fill="#091833" stroke="#711C91" stroke-width="1" filter="url(#net-glow)"/>
  <circle cx="320" cy="160" r="3" fill="#711C91" opacity="0.8"/>

  <circle cx="150" cy="210" r="6" fill="#091833" stroke="#00E5FF" stroke-width="1"/>
  <circle cx="150" cy="210" r="2.5" fill="#00E5FF" opacity="0.6"/>

  <circle cx="250" cy="210" r="6" fill="#091833" stroke="#00E5FF" stroke-width="1"/>
  <circle cx="250" cy="210" r="2.5" fill="#00E5FF" opacity="0.6"/>

  <!-- Labels -->
  <text x="200" y="152" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">Accueil</text>
  <text x="100" y="48" text-anchor="middle" font-family="Inter,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.4)">Services</text>
  <text x="300" y="48" text-anchor="middle" font-family="Inter,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.4)">Contact</text>
  <text x="65" y="178" text-anchor="middle" font-family="Inter,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.4)">Pneus</text>
  <text x="335" y="178" text-anchor="middle" font-family="Inter,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.4)">Devis</text>
  <text x="150" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.35)">Blog</text>
  <text x="250" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.35)">Zones</text>
</svg>
