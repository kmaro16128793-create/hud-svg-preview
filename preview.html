<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>HUD SVG Library Preview</title>
<style>
body{background:#091833;color:#fff;font-family:Inter,sans-serif;padding:40px;margin:0;}
h1{font-family:Orbitron,sans-serif;font-size:24px;color:#00E5FF;margin-bottom:32px;letter-spacing:1px;}
h2{font-size:14px;color:rgba(255,255,255,0.5);margin:32px 0 12px;text-transform:uppercase;letter-spacing:1px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.card{background:rgba(12,16,30,0.8);border:1px solid rgba(0,229,255,0.1);border-radius:8px;padding:20px;}
.card img{width:100%;height:auto;}
</style></head><body>
<h1>HUD SVG Library — Preview</h1>

<h2>Charts</h2>
<div class="grid">
<div class="card"><h3 style="font-size:11px;color:#00E5FF;margin-bottom:8px;">Gauge HUD Score</h3><img src="charts/gauge-hud.svg"></div>
<div class="card"><h3 style="font-size:11px;color:#00E5FF;margin-bottom:8px;">Radar Neon</h3><img src="charts/radar-neon.svg"></div>
<div class="card"><h3 style="font-size:11px;color:#00E5FF;margin-bottom:8px;">Line Chart Holographic</h3><img src="charts/line-chart-holographic.svg"></div>
<div class="card"><h3 style="font-size:11px;color:#00E5FF;margin-bottom:8px;">Donut Cyberpunk</h3><img src="charts/donut-cyberpunk.svg"></div>
<div class="card" style="grid-column:span 2;"><h3 style="font-size:11px;color:#00E5FF;margin-bottom:8px;">Heatmap Matrix</h3><img src="charts/heatmap-matrix.svg"></div>
</div>

<h2>Infographics</h2>
<div class="grid">
<div class="card" style="grid-column:span 2;"><h3 style="font-size:11px;color:#FF008D;margin-bottom:8px;">KPI Card HUD</h3><img src="infographics/kpi-card-hud.svg"></div>
<div class="card" style="grid-column:span 2;"><h3 style="font-size:11px;color:#FF008D;margin-bottom:8px;">Timeline Holographique</h3><img src="infographics/timeline-hud.svg"></div>
<div class="card" style="grid-column:span 2;"><h3 style="font-size:11px;color:#FF008D;margin-bottom:8px;">Process Flow</h3><img src="infographics/process-flow.svg"></div>
</div>

<h2>Network</h2>
<div class="grid">
<div class="card" style="grid-column:span 2;"><h3 style="font-size:11px;color:#711C91;margin-bottom:8px;">Network Graph Neon</h3><img src="network/network-graph-neon.svg"></div>
</div>

<h2>Decorations</h2>
<div class="grid">
<div class="card" style="grid-column:span 2;"><h3 style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:8px;">HUD Decor Elements</h3><img src="decorations/hud-decor.svg"></div>
</div>
</body></html>
