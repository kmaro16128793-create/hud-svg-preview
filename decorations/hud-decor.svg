<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hud-fade-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hud-fade-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- HUD Corners -->
  <path d="M 5,20 L 5,5 L 20,5" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.5"/>
  <path d="M 380,5 L 395,5 L 395,20" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.5"/>
  <path d="M 5,280 L 5,295 L 20,295" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.35"/>
  <path d="M 380,295 L 395,295 L 395,280" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.35"/>

  <!-- Top HUD line with fading -->
  <line x1="25" y1="5" x2="375" y2="5" stroke="url(#hud-fade-h)" stroke-width="0.5"/>

  <!-- Left vertical accent -->
  <line x1="5" y1="25" x2="5" y2="100" stroke="url(#hud-fade-v)" stroke-width="0.5"/>

  <!-- Grid background pattern -->
  <g opacity="0.04">
    <line x1="0" y1="50" x2="400" y2="50" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="50" y1="0" x2="50" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
  </g>

  <!-- Scanlines overlay -->
  <g opacity="0.015">
    <line x1="0" y1="1" x2="400" y2="1" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="4" x2="400" y2="4" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="7" x2="400" y2="7" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="10" x2="400" y2="10" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="13" x2="400" y2="13" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="16" x2="400" y2="16" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative data stream dots -->
  <g opacity="0.15">
    <circle cx="385" cy="40" r="1" fill="#00E5FF"/>
    <circle cx="385" cy="55" r="1.5" fill="#00E5FF"/>
    <circle cx="385" cy="72" r="1" fill="#711C91"/>
    <circle cx="385" cy="85" r="1.5" fill="#FF008D"/>
    <circle cx="385" cy="100" r="1" fill="#00E5FF"/>
    <circle cx="385" cy="115" r="1" fill="#711C91"/>
  </g>

  <!-- Horizontal accent bar -->
  <rect x="5" y="290" width="60" height="2" rx="1" fill="#00E5FF" opacity="0.15"/>
  <rect x="70" y="290" width="30" height="2" rx="1" fill="#FF008D" opacity="0.1"/>
</svg>
