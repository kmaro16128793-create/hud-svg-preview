<svg viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="line-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Grid -->
  <line x1="40" y1="20" x2="40" y2="150" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <line x1="40" y1="150" x2="380" y2="150" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <line x1="40" y1="50" x2="380" y2="50" stroke="rgba(255,255,255,0.03)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="40" y1="85" x2="380" y2="85" stroke="rgba(255,255,255,0.03)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="40" y1="117" x2="380" y2="117" stroke="rgba(255,255,255,0.03)" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- Area fill -->
  <polygon points="60,130 120,115 180,105 240,85 300,70 360,45 360,150 60,150" fill="url(#line-area)"/>

  <!-- Line principale -->
  <polyline points="60,130 120,115 180,105 240,85 300,70 360,45"
    fill="none" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#line-glow)"/>

  <!-- Data points -->
  <circle cx="60" cy="130" r="3" fill="#091833" stroke="#00E5FF" stroke-width="1.5"/>
  <circle cx="120" cy="115" r="3" fill="#091833" stroke="#00E5FF" stroke-width="1.5"/>
  <circle cx="180" cy="105" r="3" fill="#091833" stroke="#00E5FF" stroke-width="1.5"/>
  <circle cx="240" cy="85" r="3" fill="#091833" stroke="#00E5FF" stroke-width="1.5"/>
  <circle cx="300" cy="70" r="3" fill="#091833" stroke="#00E5FF" stroke-width="1.5"/>
  <circle cx="360" cy="45" r="4" fill="#00E5FF" filter="url(#line-glow)"/>

  <!-- Labels X -->
  <text x="60" y="165" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.4)">Oct</text>
  <text x="120" y="165" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.4)">Nov</text>
  <text x="180" y="165" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.4)">Dec</text>
  <text x="240" y="165" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.4)">Jan</text>
  <text x="300" y="165" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.4)">Fev</text>
  <text x="360" y="165" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.4)">Mar</text>

  <!-- Max point label -->
  <text x="360" y="38" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="8" fill="#00E5FF">2 100</text>
</svg>
