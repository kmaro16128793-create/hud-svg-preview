<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="radar-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Grilles concentriques (5 niveaux : 20,40,60,80,100%) -->
  <polygon points="150,50 243.3,100 243.3,200 150,250 56.7,200 56.7,100" fill="none" stroke="rgba(0,229,255,0.06)" stroke-width="0.5"/>
  <polygon points="150,70 225,110 225,190 150,230 75,190 75,110" fill="none" stroke="rgba(0,229,255,0.06)" stroke-width="0.5"/>
  <polygon points="150,90 206.7,120 206.7,180 150,210 93.3,180 93.3,120" fill="none" stroke="rgba(0,229,255,0.06)" stroke-width="0.5"/>
  <polygon points="150,110 188.3,130 188.3,170 150,190 111.7,170 111.7,130" fill="none" stroke="rgba(0,229,255,0.06)" stroke-width="0.5"/>
  <polygon points="150,130 170,140 170,160 150,170 130,160 130,140" fill="none" stroke="rgba(0,229,255,0.06)" stroke-width="0.5"/>

  <!-- Axes radiaux -->
  <line x1="150" y1="150" x2="150" y2="50" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <line x1="150" y1="150" x2="243.3" y2="100" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <line x1="150" y1="150" x2="243.3" y2="200" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <line x1="150" y1="150" x2="150" y2="250" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <line x1="150" y1="150" x2="56.7" y2="200" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <line x1="150" y1="150" x2="56.7" y2="100" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>

  <!-- Data polygon (actuel) -->
  <polygon points="150,62 230,115 220,195 150,235 80,185 75,108"
    fill="rgba(0,229,255,0.12)" stroke="#00E5FF" stroke-width="1.5" filter="url(#radar-glow)"/>

  <!-- Data polygon (objectif) -->
  <polygon points="150,55 240,105 235,200 150,245 65,195 60,105"
    fill="none" stroke="#FF008D" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Data points actuel -->
  <circle cx="150" cy="62" r="3" fill="#00E5FF" filter="url(#radar-glow)"/>
  <circle cx="230" cy="115" r="3" fill="#00E5FF" filter="url(#radar-glow)"/>
  <circle cx="220" cy="195" r="3" fill="#00E5FF" filter="url(#radar-glow)"/>
  <circle cx="150" cy="235" r="3" fill="#00E5FF" filter="url(#radar-glow)"/>
  <circle cx="80" cy="185" r="3" fill="#00E5FF" filter="url(#radar-glow)"/>
  <circle cx="75" cy="108" r="3" fill="#00E5FF" filter="url(#radar-glow)"/>

  <!-- Labels -->
  <text x="150" y="40" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="rgba(255,255,255,0.55)">Vitesse</text>
  <text x="255" y="98" text-anchor="start" font-family="Inter,sans-serif" font-size="8" fill="rgba(255,255,255,0.55)">Mobile</text>
  <text x="255" y="205" text-anchor="start" font-family="Inter,sans-serif" font-size="8" fill="rgba(255,255,255,0.55)">Contenu</text>
  <text x="150" y="268" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="rgba(255,255,255,0.55)">Backlinks</text>
  <text x="45" y="205" text-anchor="end" font-family="Inter,sans-serif" font-size="8" fill="rgba(255,255,255,0.55)">Technique</text>
  <text x="45" y="98" text-anchor="end" font-family="Inter,sans-serif" font-size="8" fill="rgba(255,255,255,0.55)">Securite</text>
</svg>
