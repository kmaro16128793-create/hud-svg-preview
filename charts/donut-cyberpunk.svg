<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="donut-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cercle decoratif externe -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(0,229,255,0.05)" stroke-width="0.5"/>

  <!-- Background ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="16"/>

  <!-- Segment 1: Technique 35% (cyan) -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#00E5FF" stroke-width="16"
    stroke-dasharray="35 65" stroke-dashoffset="25" transform="rotate(-90 100 100)" filter="url(#donut-glow)"/>

  <!-- Segment 2: Contenu 28% (magenta) -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#FF008D" stroke-width="16"
    stroke-dasharray="28 72" stroke-dashoffset="-10" transform="rotate(-90 100 100)" filter="url(#donut-glow)"/>

  <!-- Segment 3: Autorite 22% (violet) -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#711C91" stroke-width="16"
    stroke-dasharray="22 78" stroke-dashoffset="-38" transform="rotate(-90 100 100)"/>

  <!-- Segment 4: UX 15% (dim) -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="16"
    stroke-dasharray="15 85" stroke-dashoffset="-60" transform="rotate(-90 100 100)"/>

  <!-- Centre -->
  <circle cx="100" cy="100" r="50" fill="#091833"/>
  <text x="100" y="96" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="20" font-weight="700" fill="#00E5FF">100%</text>
  <text x="100" y="112" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.4)">REPARTITION</text>

  <!-- Legende -->
  <circle cx="30" cy="180" r="3" fill="#00E5FF"/><text x="38" y="183" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">Technique 35%</text>
  <circle cx="120" cy="180" r="3" fill="#FF008D"/><text x="128" y="183" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">Contenu 28%</text>
  <circle cx="30" cy="194" r="3" fill="#711C91"/><text x="38" y="197" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">Autorite 22%</text>
  <circle cx="120" cy="194" r="3" fill="rgba(255,255,255,0.3)"/><text x="128" y="197" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">UX 15%</text>
</svg>
