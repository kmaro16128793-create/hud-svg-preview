<svg viewBox="0 0 500 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tl-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#711C91"/>
      <stop offset="100%" stop-color="#FF008D"/>
    </linearGradient>
    <filter id="tl-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ligne principale -->
  <line x1="30" y1="55" x2="470" y2="55" stroke="url(#tl-line)" stroke-width="1.5" filter="url(#tl-glow)"/>

  <!-- Node 1 — Semaine 1-2 -->
  <circle cx="70" cy="55" r="8" fill="#091833" stroke="#00E5FF" stroke-width="1.5" filter="url(#tl-glow)"/>
  <circle cx="70" cy="55" r="3" fill="#00E5FF"/>
  <text x="70" y="30" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="7" fill="#00E5FF" letter-spacing="0.5">S1-S2</text>
  <text x="70" y="80" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.6)">Quick Wins</text>
  <text x="70" y="92" text-anchor="middle" font-family="Inter,sans-serif" font-size="6" fill="rgba(255,255,255,0.35)">Corrections tech</text>

  <!-- Node 2 — Semaine 3-4 -->
  <circle cx="190" cy="55" r="8" fill="#091833" stroke="#711C91" stroke-width="1.5" filter="url(#tl-glow)"/>
  <circle cx="190" cy="55" r="3" fill="#711C91"/>
  <text x="190" y="30" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="7" fill="#711C91" letter-spacing="0.5">S3-S4</text>
  <text x="190" y="80" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.6)">On-Page</text>
  <text x="190" y="92" text-anchor="middle" font-family="Inter,sans-serif" font-size="6" fill="rgba(255,255,255,0.35)">Vitesse + maillage</text>

  <!-- Node 3 — Mois 2 -->
  <circle cx="310" cy="55" r="8" fill="#091833" stroke="#FF008D" stroke-width="1.5" filter="url(#tl-glow)"/>
  <circle cx="310" cy="55" r="3" fill="#FF008D"/>
  <text x="310" y="30" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="7" fill="#FF008D" letter-spacing="0.5">MOIS 2</text>
  <text x="310" y="80" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.6)">Contenu</text>
  <text x="310" y="92" text-anchor="middle" font-family="Inter,sans-serif" font-size="6" fill="rgba(255,255,255,0.35)">Blog + pages SEO</text>

  <!-- Node 4 — Mois 3 -->
  <circle cx="430" cy="55" r="8" fill="#091833" stroke="#00E5FF" stroke-width="1.5" filter="url(#tl-glow)"/>
  <circle cx="430" cy="55" r="3" fill="#00E5FF"/>
  <text x="430" y="30" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="7" fill="#00E5FF" letter-spacing="0.5">MOIS 3</text>
  <text x="430" y="80" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.6)">Netlinking</text>
  <text x="430" y="92" text-anchor="middle" font-family="Inter,sans-serif" font-size="6" fill="rgba(255,255,255,0.35)">Backlinks + autorite</text>
</svg>
