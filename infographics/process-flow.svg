<svg viewBox="0 0 500 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="pf-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="pf-arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Step 1 -->
  <rect x="5" y="15" width="70" height="50" rx="6" fill="rgba(18,22,41,0.8)" stroke="#00E5FF" stroke-width="1"/>
  <text x="40" y="35" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="14" font-weight="700" fill="#00E5FF">01</text>
  <text x="40" y="52" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.6)">CRAWL</text>

  <!-- Arrow 1 -->
  <line x1="80" y1="40" x2="100" y2="40" stroke="url(#pf-arrow)" stroke-width="1"/>
  <polygon points="98,37 104,40 98,43" fill="rgba(0,229,255,0.3)"/>

  <!-- Step 2 -->
  <rect x="105" y="15" width="70" height="50" rx="6" fill="rgba(18,22,41,0.8)" stroke="#711C91" stroke-width="1"/>
  <text x="140" y="35" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="14" font-weight="700" fill="#711C91">02</text>
  <text x="140" y="52" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.6)">ANALYSE</text>

  <!-- Arrow 2 -->
  <line x1="180" y1="40" x2="200" y2="40" stroke="url(#pf-arrow)" stroke-width="1"/>
  <polygon points="198,37 204,40 198,43" fill="rgba(0,229,255,0.3)"/>

  <!-- Step 3 -->
  <rect x="205" y="15" width="70" height="50" rx="6" fill="rgba(18,22,41,0.8)" stroke="#FF008D" stroke-width="1"/>
  <text x="240" y="35" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="14" font-weight="700" fill="#FF008D">03</text>
  <text x="240" y="52" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.6)">SCORING</text>

  <!-- Arrow 3 -->
  <line x1="280" y1="40" x2="300" y2="40" stroke="url(#pf-arrow)" stroke-width="1"/>
  <polygon points="298,37 304,40 298,43" fill="rgba(0,229,255,0.3)"/>

  <!-- Step 4 -->
  <rect x="305" y="15" width="70" height="50" rx="6" fill="rgba(18,22,41,0.8)" stroke="#00E5FF" stroke-width="1"/>
  <text x="340" y="35" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="14" font-weight="700" fill="#00E5FF">04</text>
  <text x="340" y="52" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.6)">RAPPORT</text>

  <!-- Arrow 4 -->
  <line x1="380" y1="40" x2="400" y2="40" stroke="url(#pf-arrow)" stroke-width="1"/>
  <polygon points="398,37 404,40 398,43" fill="rgba(0,229,255,0.3)"/>

  <!-- Step 5 -->
  <rect x="405" y="15" width="70" height="50" rx="6" fill="rgba(18,22,41,0.8)" stroke="#711C91" stroke-width="1"/>
  <text x="440" y="35" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="14" font-weight="700" fill="#711C91">05</text>
  <text x="440" y="52" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,0.6)">EMAIL</text>
</svg>
