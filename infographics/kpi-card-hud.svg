<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="kpi-spark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="1"/>
    </linearGradient>
    <filter id="kpi-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect x="1" y="1" width="198" height="98" rx="8" fill="rgba(18,22,41,0.8)" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>

  <!-- Top accent line -->
  <line x1="10" y1="1" x2="60" y2="1" stroke="#00E5FF" stroke-width="2" filter="url(#kpi-glow)"/>

  <!-- HUD corners -->
  <path d="M 1,10 L 1,1 L 10,1" fill="none" stroke="rgba(0,229,255,0.25)" stroke-width="1"/>
  <path d="M 190,1 L 199,1 L 199,10" fill="none" stroke="rgba(0,229,255,0.25)" stroke-width="1"/>
  <path d="M 1,90 L 1,99 L 10,99" fill="none" stroke="rgba(0,229,255,0.15)" stroke-width="1"/>
  <path d="M 190,99 L 199,99 L 199,90" fill="none" stroke="rgba(0,229,255,0.15)" stroke-width="1"/>

  <!-- Label -->
  <text x="14" y="22" font-family="Inter,sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">SCORE GLOBAL</text>

  <!-- Metric principale -->
  <text x="14" y="52" font-family="Orbitron,sans-serif" font-size="28" font-weight="800" fill="#00E5FF">81</text>
  <text x="60" y="52" font-family="Inter,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">/100</text>

  <!-- Delta variation -->
  <text x="14" y="70" font-family="Inter,sans-serif" font-size="9" fill="#00F5A0">↑ +8%</text>
  <text x="55" y="70" font-family="Inter,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">vs mois dernier</text>

  <!-- Sparkline -->
  <polyline points="110,80 120,72 130,75 140,65 150,68 160,55 170,58 180,45 190,42"
    fill="none" stroke="url(#kpi-spark)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#kpi-glow)"/>

  <!-- Sparkline area -->
  <polygon points="110,80 120,72 130,75 140,65 150,68 160,55 170,58 180,45 190,42 190,88 110,88"
    fill="rgba(0,229,255,0.06)"/>
</svg>
